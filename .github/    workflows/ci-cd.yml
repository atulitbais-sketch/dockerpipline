name: CI/CD Pipeline

on:
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  check-password:
    runs-on: ubuntu-latest

    steps:
    - name: Check Password
      run: |
        if [ "$PASSWORD" != "mysecret123" ]; then
          echo "❌ Wrong Password"
          exit 1
        else
          echo "✅ Correct Password"
        fi
      env:
        PASSWORD: ${{ secrets.MY_PASSWORD }}
